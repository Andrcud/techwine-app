<html lang="ru">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TechWine — VasonGroup</title>

<style>
  :root{
    --bg:#0b1a14; --bg2:#0f2419; --card:#13301f; --card2:#183d28;
    --line:#245239; --accent:#2fbf71; --accent2:#7fe3a8;
    --txt:#eaf5ee; --dim:#8fae9c; --gold:#d9b26a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;padding:0;background:linear-gradient(180deg,#0a1811,#0b1a14 40%,#08130e);
    color:var(--txt);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;padding-bottom:76px;
  }
  .wrap{padding:12px 12px 0}
  .hd{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .brand{font-size:17px;font-weight:700;letter-spacing:.3px}
  .brand span{color:var(--accent)}
  .lang{display:flex;gap:6px}
  .lang button{
    background:var(--card);border:1px solid var(--line);color:var(--dim);
    border-radius:9px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;
  }
  .lang button.on{background:var(--accent);border-color:var(--accent);color:#06180f}

  /* Плитки */
  .hero{
    display:block;width:100%;border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(135deg,#164a2c,#0f2f1d 70%);
    padding:20px 16px;margin-bottom:12px;text-align:left;cursor:pointer;
    position:relative;overflow:hidden;
  }
  .hero:after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;
    background:radial-gradient(circle,rgba(47,191,113,.35),transparent 65%);}
  .hero .ic{font-size:30px}
  .hero .t{font-size:17px;font-weight:800;margin-top:6px;letter-spacing:.4px}
  .hero .s{font-size:12.5px;color:var(--accent2);margin-top:3px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .tile{
    border:1px solid var(--line);border-radius:15px;
    background:linear-gradient(160deg,var(--card2),var(--card));
    padding:16px 13px 14px;min-height:112px;cursor:pointer;text-align:left;
    display:flex;flex-direction:column;justify-content:space-between;
    color:var(--txt);
  }
  .tile:active{transform:scale(.975)}
  .tile .ic{font-size:26px}
  .tile .t{font-size:13.5px;font-weight:800;letter-spacing:.3px;line-height:1.25}
  .tile .s{font-size:11px;color:var(--dim);margin-top:2px;font-weight:500}

  /* Списки */
  .row{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 13px;margin-bottom:8px;cursor:pointer;color:var(--txt);
  }
  .row:active{background:var(--card2)}
  .row .ic{font-size:19px;flex:0 0 auto}
  .row .b{flex:1;min-width:0}
  .row .t{font-size:14px;font-weight:700;line-height:1.3}
  .row .s{font-size:11.5px;color:var(--dim);margin-top:2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .n{font-size:11px;color:var(--accent);font-weight:700;flex:0 0 auto}

  .back{background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;
    padding:6px 0 10px;cursor:pointer}
  h2{font-size:18px;margin:0 0 12px;font-weight:800}
  .sub{color:var(--dim);font-size:12px;margin:-6px 0 12px}

  /* Поиск */
  .search{
    width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;color:var(--txt);font-size:15px;margin-bottom:12px;outline:none;
  }
  .search:focus{border-color:var(--accent)}

  /* Карточка */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px}
  .card h3{margin:0 0 4px;font-size:17px}
  .tagline{color:var(--accent2);font-size:12px;margin-bottom:10px}
  .desc{font-size:13.5px;color:#cfe3d6;white-space:pre-wrap}
  .arts{margin-top:11px;font-size:11.5px;color:var(--dim)}
  .arts code{background:#0a1c12;border:1px solid var(--line);border-radius:5px;
    padding:2px 6px;margin-right:5px;color:var(--accent2);font-size:11px}
  .packs{margin-top:8px;font-size:12px;color:var(--dim)}
  .dose{margin-top:11px;padding:9px 11px;background:#0a1c12;border:1px solid var(--accent);
    border-radius:9px;font-size:13px;color:var(--accent2)}
  .dose b{color:var(--txt)}

  .btn{
    display:block;width:100%;border-radius:12px;padding:14px;margin-top:9px;
    font-size:14.5px;font-weight:700;cursor:pointer;border:1px solid var(--line);
    background:var(--card2);color:var(--txt);text-align:center;
  }
  .btn.pri{background:linear-gradient(135deg,var(--accent),#1f9d59);border-color:var(--accent);color:#06180f}
  .btn.gold{background:linear-gradient(135deg,#c9a15b,#a8813f);border-color:var(--gold);color:#1a1204}

  .empty{text-align:center;color:var(--dim);padding:34px 10px;font-size:13.5px}

  /* Нижняя навигация */
  /* Калькулятор */
  .seg{display:flex;gap:6px;margin:0 0 14px}
  .seg button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--dim);
    border-radius:11px;padding:9px 6px;font-size:12.5px;font-weight:700;cursor:pointer}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#06180f}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12px;color:var(--dim);margin:0 0 5px;font-weight:600}
  .fld input,.fld select{
    width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
    border-radius:11px;padding:11px 12px;font-size:15px;font-family:inherit;outline:none;
  }
  .fld input:focus,.fld select:focus{border-color:var(--accent)}
  .duo{display:grid;grid-template-columns:2fr 1fr;gap:8px}
  .out{background:var(--card2);border:1px solid var(--accent);border-radius:14px;
    padding:14px;margin-top:4px}
  .out .big{font-size:26px;font-weight:800;color:var(--accent2);letter-spacing:.3px}
  .out .lbl{font-size:12px;color:var(--dim);font-weight:600;margin-bottom:2px}
  .out .hint{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.5}
  .out .row2{display:flex;justify-content:space-between;align-items:baseline;
    padding:7px 0;border-top:1px solid var(--line);margin-top:8px}
  .out .row2 b{color:var(--txt);font-size:15px;font-weight:700}
  .tbl{width:100%;border-collapse:collapse;margin-top:10px}
  .tbl th{font-size:11px;color:var(--dim);text-align:left;font-weight:700;
    padding:6px 8px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.3px}
  .tbl td{font-size:14px;padding:8px;border-bottom:1px solid rgba(36,82,57,.5)}
  .tbl td:first-child{color:var(--dim);white-space:nowrap}
  .tbl td.v{color:var(--accent2);font-weight:800;text-align:right;white-space:nowrap}
  .tbl td.d{color:var(--dim);font-size:12px;text-align:right;white-space:nowrap}
  .tbl tr.dim td{opacity:.45}
  .tbl tr.dim td.v:after{content:" ⚠"}
  .warn{background:#3d2a13;border:1px solid var(--gold);border-radius:12px;
    padding:11px 12px;font-size:12.5px;color:#f0dcb4;margin-top:10px;line-height:1.5}
  /* Проблемы */
  .prob{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px;margin-bottom:9px;cursor:pointer;color:var(--txt)}
  .prob:active{background:var(--card2)}
  .prob .ic{font-size:22px;flex:0 0 auto;line-height:1.2}
  .prob .t{font-size:14.5px;font-weight:800;line-height:1.3}
  .prob .s{font-size:11.5px;color:var(--dim);margin-top:3px;line-height:1.4}
  .blk{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px;margin-bottom:11px}
  .blk h4{margin:0 0 9px;font-size:12px;color:var(--accent);font-weight:800;
    text-transform:uppercase;letter-spacing:.5px}
  .blk ul{margin:0;padding-left:17px}
  .blk li{font-size:13px;color:#cfe3d6;margin-bottom:5px;line-height:1.45}
  .br{border-left:3px solid var(--line);border-radius:0;padding:10px 0 10px 11px;margin-bottom:12px}
  .br.ok{border-left-color:var(--accent)}
  .br.warn{border-left-color:var(--gold)}
  .br.bad{border-left-color:#d9534f}
  .br .w{font-size:13.5px;font-weight:800;margin-bottom:5px}
  .br.ok .w{color:var(--accent2)} .br.warn .w{color:#e8c884} .br.bad .w{color:#f0928e}
  .br .a{font-size:13px;color:#cfe3d6;line-height:1.5}
  .pill{display:inline-flex;align-items:center;gap:5px;background:#0a1c12;
    border:1px solid var(--accent);border-radius:9px;padding:6px 9px;margin:7px 6px 0 0;
    font-size:12px;color:var(--accent2);cursor:pointer;font-weight:600}
  .pill .dz{color:var(--dim);font-weight:500;font-size:11px}
  .pill.eq{border-color:var(--line);color:var(--txt)}
  .nav{
    position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);
    background:rgba(9,22,15,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .nav button{background:none;border:none;color:var(--dim);font-size:10.5px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px}
  .nav button .ic{font-size:19px}
  .nav button.on{color:var(--accent)}
</style>
</head>

/* ── Возврат в бота: закрываем WebApp и открываем чат с payload ── */
function toBot(payload){
  const url = `https://t.me/${BOT}?start=${payload}`;
  TG?.HapticFeedback?.impactOccurred?.("medium");
  if (TG?.openTelegramLink) { TG.openTelegramLink(url); TG.close?.(); }
  else window.open(url, "_blank");
}
const slug = s => s.replace(/[^A-Za-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,48);

function doSearch(q){
  const el = document.getElementById("res");
  q = (q||"").trim().toLowerCase();
  if (q.length < 2){ el.innerHTML = `<div class="empty">${t("minc")}</div>`; return; }
  const hits = [];
  for (const p of DB.vason.products){
    const nl = p.name.toLowerCase();
    let sc;
    if (p.arts.some(a=>a.toLowerCase().includes(q))) sc = 130;
    else if (nl.includes(q)) sc = 110 - Math.abs(nl.length - q.length);
    else if ((p.desc[L]||p.desc.ru||"").toLowerCase().includes(q)) sc = 55;
    else sc = sim(q, nl);
    if (sc >= 62) hits.push({sc, kind:"v", name:p.name, sub:p.arts.join(" · ")});
  }
  for (const [aid,a] of Object.entries(DB.juclas.apparatus)){
    const tl = a.title[L].toLowerCase();
    const sc = tl.includes(q) ? 110 - Math.abs(tl.length - q.length) : sim(q, tl);
    if (sc >= 62) hits.push({sc, kind:"j", name:a.title[L], sub:"JUCLAS", id:aid});
  }
  if (!hits.length){ el.innerHTML = `<div class="empty">${t("nores")}</div>`; return; }
  hits.sort((a,b)=>b.sc-a.sc);
  el.innerHTML = hits.slice(0,30).map(h=>`

}

/* Расстояние Левенштейна: ловит опечатки (SMARTGUN → SMARTGUM),
   но не даёт ложных совпадений вроде SMARTGUN → MPA. */
function lev(a,b){
  const m=a.length, n=b.length;
  if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,j)=>j), cur=new Array(n+1);
  for(let i=1;i<=m;i++){
    cur[0]=i;
    for(let j=1;j<=n;j++){
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
    }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function sim(a,b){
  /* лучшее совпадение по любому слову в названии — «gum» найдёт «SMARTGUM® 2.0» */
  let best = 1 - lev(a,b)/Math.max(a.length,b.length);
  for (const w of b.split(/[\s·®,\/]+/)){
    if (!w) continue;
    const r = 1 - lev(a,w)/Math.max(a.length,w.length);
    if (r > best) best = r;
  }
  return Math.round(best*100);
}

/* ── Калькулятор дозировки ───────────────────────────────────
   Дозировки в каталоге: "▸ 25–150 г/гл" либо с уточнением сорта:
   "▸ 5–15 кр ▸ 1–10 роз ▸ 1–5 бел г/гл". Парсим все диапазоны. */
let CM = "batch";                       /* режим: batch | stock */
let CP = "";                            /* выбранный продукт */

function parseDose(s){
  s = (s || "").trim();
  if (!s) return null;
  const unit = /мл\/гл|mL\/hL|ml\/hl/i.test(s) ? "ml" : "g";
  const out = [];
  for (const part of s.split("▸")){
    const p = part.trim();
    if (!p) continue;
    const m = p.match(/(\d+(?:[.,]\d+)?)\s*(?:[–—-]\s*(\d+(?:[.,]\d+)?))?/);
    if (!m) continue;
    const lo = parseFloat(m[1].replace(",", "."));
    const hi = m[2] ? parseFloat(m[2].replace(",", ".")) : lo;
    const note = p.slice(m[0].length)
                  .replace(/г\/гл|мл\/гл|g\/hL|mL\/hL/gi, "").trim();
    if (!isNaN(lo)) out.push({lo, hi, note});
  }
  return out.length ? {unit, ranges: out} : null;
}

  .filter(p => parseDose((p.dose||{})[L] || (p.dose||{}).ru))

const num = (v, d) => { const x = parseFloat(String(v).replace(",", ".")); return isNaN(x) ? d : x; };
const fmt = x => x >= 100 ? Math.round(x).toLocaleString()
               : x >= 10  ? x.toFixed(1)
               : x >= 1   ? x.toFixed(2)
               : x.toFixed(3);

/* режим 1: доза каталога × объём партии */
/* Тонна = 1000 л вина (объёмная тонна, как принято в виноделии) */
const L_PER_TON = 1000;

/* Граммы до килограмма, дальше — килограммы */
function mass(g, unit){
  if (unit === "мл") return g >= 1000 ? `${fmt(g/1000)} л` : `${fmt(g)} мл`;
  return g >= 1000 ? `${fmt(g/1000)} кг` : `${fmt(g)} г`;
}

function doBatch(){
  const el = document.getElementById("cout");
  const dd = doseOf(CP);                       /* дозировка каталога, если продукт выбран */
  const cd = document.getElementById("cd");
  if (dd && !cd.dataset.touched) cd.value = dd.ranges[0].lo;
  cd.dataset.touched = "1";

  const dose = num(cd.value, 0);
  const v    = num(document.getElementById("cv").value, 0);
  const unit = document.getElementById("cu").value;
  if (v <= 0){ el.innerHTML = ""; return; }

  /* тонны вина → литры → гектолитры */
  const litres = unit === "t" ? v * L_PER_TON
               : unit === "l" ? v
               :                v * 100;
  const hl = litres / 100;
  const u  = (dd && dd.unit === "ml") ? "мл" : "г";

  const volLine = unit === "t"
    ? `${fmt(v)} т вина · ${fmt(litres)} л · ${fmt(hl)} гл`
    : `${fmt(hl)} гл · ${fmt(litres)} л`;

  /* если выбран продукт — показываем и его диапазон из каталога */
  const rows = dd ? dd.ranges.map(r => {
    const lo = r.lo * hl, hi = r.hi * hl;
    const val = lo === hi ? mass(lo,u) : `${mass(lo,u)} – ${mass(hi,u)}`;
    const note = esc(r.note) || t("hRange");
    return `<div class="row2"><span>${note} · ${r.lo}–${r.hi} ${u}/гл</span><b>${val}</b></div>`;
  }).join("") : "";

  /* таблица ходовых доз для этой же партии */
  const tbl = DOSES.map(d => `
    <tr><td>${d} ${u}/гл</td><td class="v">${mass(d*hl, u)}</td></tr>`).join("");

  el.innerHTML = `
    <div class="out">
      <div class="lbl">${t("oNeed")} · ${volLine}</div>
      <div class="big">${dose > 0 ? mass(dose*hl, u) : "—"}</div>
      ${dose > 0 ? `<div class="hint">${t("fDose")}: ${fmt(dose)} ${u}/гл</div>` : ""}
      ${rows}
      ${dd ? `<div class="hint">${t("hDoseCat")}: ${esc((DB.vason.products.find(x=>x.name===CP).dose||{})[L] || "")}</div>` : ""}
      ${unit === "t" ? `<div class="hint">${t("hTons")}</div>` : ""}
    </div>
    <div class="out" style="margin-top:12px">
      <div class="lbl">${t("tblB")} · ${fmt(hl)} гл</div>
      <table class="tbl">
        <tr><th>${t("tDose")}</th><th style="text-align:right">${t("tAmt")}</th></tr>
        ${tbl}
      </table>
    </div>
    <div class="warn">${t("wCheck")}</div>`;
}

/* Таблица «доза → сколько мл раствора» для введённых % и объёма пробы */
const DOSES = [1, 2, 3, 5, 8, 10, 15, 20, 25, 30, 40, 50, 75, 100, 150];

function doseTable(c, v){
  const rows = DOSES.map(d => {
    const ml = d * v / (1000 * c);
    const tiny = ml < 0.1;
    return `<tr class="${tiny ? 'dim' : ''}">
      <td>${d} г/гл</td>
      <td class="v">${fmt(ml)} мл</td>
      <td class="d">${ml >= 0.05 ? "≈ " + Math.round(ml*20) : "<1"}</td>
    </tr>`;
  }).join("");
  const anyTiny = DOSES.some(d => d * v / (1000 * c) < 0.1);
  return `
    <div class="out" style="margin-top:12px">
      <div class="lbl">${t("tblT")} · ${fmt(v)} мл · ${c}%</div>
      <table class="tbl">
        <tr><th>${t("tDose")}</th><th style="text-align:right">${t("tMl")}</th><th style="text-align:right">${t("tDrop")}</th></tr>
        ${rows}
      </table>
      ${anyTiny ? `<div class="hint">${t("tNote")}</div>` : ""}
    </div>`;
}

/* режим 2: рабочий раствор для лабораторной пробы */
function doStock(){
  const el = document.getElementById("sout");
  const c  = num(document.getElementById("sc").value, 0);   /* % раствора  */
  const v  = num(document.getElementById("sv").value, 0);   /* мл пробы    */
  const dd = doseOf(CP);
  const sd = document.getElementById("sd");
  if (dd && document.activeElement !== sd && !sd.dataset.touched){
    sd.value = dd.ranges[0].lo;                              /* подставляем нижнюю дозу */
  }
  sd.dataset.touched = "1";
  const d  = num(sd.value, 0);                              /* г/гл или мл/гл */
  const added = num(document.getElementById("sa").value, NaN);

  if (c <= 0 || v <= 0){ el.innerHTML = ""; return; }

  /* мл раствора = доза × объём_пробы / (1000 × %) */
  const ml = d * v / (1000 * c);
  const g  = c * v / 100;   /* сколько грамм продукта на объём готового раствора v — для подсказки */

  const prep = t("hPrep").replace("{c}", c).replace("{g}", fmt(c)).replace("{v}", "100");
  const drops = t("hDrops").replace("{n}", Math.round(ml * 20));

  let back = "";
  if (!isNaN(added) && added > 0){
    const gotDose = added * 1000 * c / v;                    /* обратный расчёт */
    back = `<div class="row2"><span>${t("oGot")} · ${fmt(added)} мл</span><b>${fmt(gotDose)} г/гл</b></div>`;
  }

  const tiny = (ml > 0 && ml < 0.1) ? `<div class="warn">${t("hTiny")}</div>` : "";
  const rangeHint = dd
    ? `<div class="hint">${t("hRange")}: ${esc((DB.vason.products.find(x=>x.name===CP).dose||{})[L] || "")}</div>`
    : "";

  el.innerHTML = `
    <div class="out">
      <div class="lbl">${t("oStock")} · ${fmt(v)} мл</div>
      <div class="big">${d > 0 ? fmt(ml) + " мл" : "—"}</div>
      ${d > 0 ? `<div class="hint">${drops}</div>` : ""}
      ${back}
      <div class="hint">${prep}</div>
      <div class="hint">${t("hMedium")}</div>
      ${rangeHint}
    </div>${tiny}${doseTable(c, v)}`;
}

        <tr><th>pH</th><th style="text-align:right">0,5</th><th style="text-align:right">0,6</th><th style="text-align:right">0,8</th></tr>
        ${rows}
      </table>
      <div class="s" style="font-size:11.5px;color:var(--dim);margin-top:8px">${t("pSo2h")}: 0,5 · 0,6 · 0,8 мг/л</div>
    </div>`;
}

function prob(id){
  const p = PROBLEMS.find(x => x.id === id);
  const li = arr => `<ul>${arr.map(s => `<li>${esc(s)}</li>`).join("")}</ul>`;

  const branches = p.branches.map(b => `
    <div class="br ${b.lvl}">
      <div class="w">${esc(b.when[L])}</div>
      <div class="a">${esc(b.act[L])}</div>
      <div>${(b.products || []).map(pill).join("")}</div>
    </div>`).join("");

  const equip = (p.equip || []).length
    ? `<div class="blk"><h4>${t("pEquip")}</h4><div>${p.equip.map(eqpill).join("")}</div></div>` : "";

  return back() + `
    <h2>${p.icon} ${p.title[L]}</h2>
    <div class="sub">${p.sub[L]}</div>

    <div class="blk"><h4>${t("pSympt")}</h4>${li(p.symptoms[L])}</div>
    <div class="blk"><h4>${t("pDiag")}</h4>${li(p.diag[L])}</div>

    <div class="blk">
      <h4>${t("pSolve")}</h4>
      ${branches}
    </div>

    ${p.so2table ? so2block() : ""}
    ${equip}

    <div class="blk"><h4>${t("pPrev")}</h4>${li(p.prevent[L])}</div>

    <div class="warn">${t("pDisc")}</div>
    <button class="btn pri" onclick="toBot('ask')">${t("ask")}</button>`;
}

/* ── Роутер ─────────────────────────────────────────────── */
const VIEWS = {home, juclas, jcat, japp, vason, vsec, vprod, protocols, prob};
function go(name, arg){
  stack.push([name, arg]);
  render(VIEWS[name](arg));
  window.scrollTo(0,0);
}
function back(){ return `<button class="back" onclick="pop()">${t("backT")}</button>`; }
function pop(){
  stack.pop();
  const [n,a] = stack[stack.length-1] || ["home"];
  if (n==="home"){ stack=[]; render(home()); } else { render(VIEWS[n](a)); }
  window.scrollTo(0,0);
}
function render(html){ document.getElementById("view").innerHTML = html; }

function tabTo(tb){
  tab = tb; stack = [];
  render(tb==="home"?home(): tb==="search"?searchView(): tb==="calc"?calcView():
         tb==="probs"?probsView(): tb==="docs"?docsView(): helpView());
  if (tb==="calc"){ CM==="batch" ? doBatch() : doStock(); }
  drawNav(); window.scrollTo(0,0);
}
function drawNav(){
  const items=[["home","🏠"],["search","🔍"],["probs","⚠️"],["calc","🧮"],["docs","💶"]];
  document.getElementById("nav").innerHTML = items.map(([k,ic])=>`
    <button class="${tab===k?'on':''}" onclick="tabTo('${k}')">
      <div class="ic">${ic}</div>${t(k)}
    </button>`).join("");
}
function drawLang(){
  document.getElementById("lang").innerHTML = ["ru","en","ro"].map(l=>
    `<button class="${L===l?'on':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`).join("");
}
function setLang(l){
  L=l; localStorage.setItem("tw_lang",l);
  drawLang(); drawNav(); tabTo(tab);
}

const esc = s => (s||"").replace(/[<>]/g,c=>({"<":"&lt;",">":"&gt;"}[c]));
const enc = s => encodeURIComponent(s).replace(/'/g,"%27");
const dec = s => decodeURIComponent(s);

/* ── Старт ──────────────────────────────────────────────── */
(async function(){
  TG?.ready(); TG?.expand();
  try { TG.setHeaderColor("#0b1a14"); TG.setBackgroundColor("#0b1a14"); } catch(e){}
  try{
    DB = await (await fetch("catalog.json?v=" + DATA_VERSION)).json();
  }catch(e){
    document.getElementById("view").innerHTML =
      `<div class="empty">⚠️ catalog.json не загружен</div>`;
    return;
  }
  drawLang(); drawNav(); tabTo("home");
})();
</script>
